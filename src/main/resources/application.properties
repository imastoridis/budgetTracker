# ===============================================
# Default Spring Boot Application Properties
# Use H2 in-memory database for local development ease.
# ===============================================

# -----------------
# 1. SERVER CONFIGURATION
# -----------------
server.port=8080
server.address=localhost

# -----------------
# 2. H2 IN-MEMORY DATABASE (Default Profile)
# -----------------
# Spring Data JPA setup for H2
spring.datasource.url=jdbc:h2:mem:budgetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable H2 Console for browser access to the database (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------
# 3. JPA/HIBERNATE CONFIGURATION
# -----------------
# Automatically create/update the database schema based on entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------
# 4. SPRING WEB/MVC
# -----------------
# Disable strict Thymeleaf template checking during development
spring.thymeleaf.cache=false

# -----------------
# 5. LOGGING
# -----------------
logging.level.com.budgetTracker=DEBUG